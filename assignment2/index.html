<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Assignment 2</title>
        <style>
            :root {
                --bg: #f8f7fb;
                --paper: #ffffff;
                --ink: #221a36;
                --muted: #5e5471;
                --line: #ddd6ec;
                --accent: #5c4bb5;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                color: var(--ink);
                background:
                    radial-gradient(circle at 12% 10%, #ece6ff 0%, rgba(236, 230, 255, 0) 34%),
                    radial-gradient(circle at 88% 16%, #dff3ff 0%, rgba(223, 243, 255, 0) 28%),
                    var(--bg);
                min-height: 100vh;
            }

            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 28px 18px 44px;
            }

            .panel {
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: 16px;
                padding: 24px;
            }

            h1 {
                margin: 0 0 10px;
            }

            p {
                margin: 0;
                color: var(--muted);
                line-height: 1.6;
            }

            .badge {
                display: inline-block;
                margin-top: 12px;
                padding: 6px 10px;
                border-radius: 999px;
                border: 1px solid #c8bee9;
                background: #f5f1ff;
                color: var(--accent);
                font-weight: 600;
                font-size: 0.85rem;
            }

            .top-link {
                display: inline-block;
                margin-top: 14px;
                color: #433199;
                text-decoration: none;
                font-weight: 600;
            }

            .top-link:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <main class="container">
            <section class="panel">
                <h1>Assignment 2</h1>
                <p>This page is ready for Assignment 2 content and links.</p>
                <span class="badge">Status: prepared for publish</span>
                <br />
                <a class="top-link" href="../">Back to Home</a>
            </section>
        </main>
    </body>
</html>
